# MLOps concept:
# Scheduled retraining keeps the model fresh as real-world data evolves.
# Running the pipeline every Monday ensures the team starts the week with
# an up-to-date model without any manual intervention.

name: Scheduled Retraining

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Also triggerable manually from the GitHub Actions UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        # Loads, validates, preprocesses and engineers features
        run: python src/pipelines/run_data_pipeline.py

      - name: Run training pipeline
        # Trains models, evaluates quality gate, registers champion
        run: python src/pipelines/run_training.py

      - name: Print registered model version
        # Shows which version was just registered so the log is self-documenting
        run: |
          python - <<'EOF'
          from mlflow import MlflowClient
          client = MlflowClient(tracking_uri="mlruns")
          versions = client.search_model_versions("name='california-housing-model'")
          print("Registered version:", max(versions, key=lambda v: int(v.version)).version)
          EOF
